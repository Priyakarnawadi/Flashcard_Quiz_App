<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📚 Flashcard Quiz App</h1>
    <div class="input-section">

    <input type="text" id="newQuestion" placeholder="Enter Question">

    <input type="text" id="newAnswer" placeholder="Enter Answer">

    <button id="addBtn">Add Flashcard</button>

</div>
    <p id="cardCounter"></p>  

    <div class="flashcard">
        <h2 id="question">Question will appear here</h2>
        <p id="answer" style="display:none;">Answer will appear here</p>

        <button id="showBtn">Show Answer</button>
    </div>
<div class="buttons">
    <button id="prevBtn">Previous</button>
    <button id="editBtn">Edit</button>
    <button id="deleteBtn">Delete</button>
    <button id="nextBtn">Next</button>
</div>
<footer>
    <p>© 2026 Created by <strong>Priya Karnawadi</strong></p>
</footer>
 <script src="script.js"></script>

</div>

</body>
</html>
